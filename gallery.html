<!DOCTYPE html>
<html lang="en">

<head>

    <!-- ================= META ================= -->

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- ================= TITLE ================= -->

    <title>Gallery | Mr. Chai</title>

    <!-- ================= CSS ================= -->

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <!-- ================= NAVIGATION ================= -->

    <header>

        <nav>

            <div class="logo">

                <img src="images/logo.png" alt="Mr. Chai">

                <span>MR. CHAI</span>

            </div>

            <ul>

                <li><a href="index.html">Home</a></li>

                <li><a href="about.html">About</a></li>

                <li><a href="menu.html">Menu</a></li>

                <li><a href="gallery.html" class="active">Gallery</a></li>

                <li><a href="contact.html">Contact</a></li>

            </ul>

        </nav>

    </header>

    <!-- ================= HERO ================= -->

    <section class="gallery-hero">

        <div class="gallery-hero-content">

            <h1>OUR GALLERY</h1>

            <p>Every Picture Tells Our Story</p>

        </div>

    </section>
    <section class="gallery-section fade-in">
<!-- ================= TEA GALLERY ================= -->

<section class="gallery-section">

    <h2>Tea Gallery</h2>

    <div class="gallery-grid">

        <img src="images/masala.jpg" alt="Masala Chai">

        <img src="images/ginger.jpg" alt="Ginger Chai">

        <img src="images/elaichi.jpg" alt="Elaichi Chai">

    </div>

</section>

<!-- ================= MILKSHAKES ================= -->

<section class="gallery-section">

    <h2>Milkshake Gallery</h2>

    <div class="gallery-grid">

        <img src="images/mangomilkshake.jpg" alt="Mango">

        <img src="images/chocolatemilkshake.jpg" alt="Chocolate">

        <img src="images/bananamilkshake.jpg" alt="Banana">

    </div>

</section>

<!-- ================= SNACKS ================= -->

<section class="gallery-section">

    <h2>Snacks Gallery</h2>

    <div class="gallery-grid">

        <img src="images/frenchfries.jpg" alt="French Fries">

        <img src="images/sandwich.jpg" alt="Sandwich">

        <img src="images/burger.jpg" alt="Burger">

    </div>

</section>

<!-- ================= SHOP ================= -->

<section class="gallery-section">

    <h2>Our Shop</h2>

    <div class="gallery-grid">

        <img src="images/shop1.jpg" alt="Shop">

        <img src="images/shop2.jpg" alt="Shop">

        <img src="images/shop3.jpg" alt="Shop">

    </div>

</section>

<!-- ================= BACK TO TOP ================= -->

<button id="backToTop" title="Back to Top">
    ↑
</button>
<!-- ==========================================
            IMAGE LIGHTBOX
========================================== -->

<div id="imageModal" class="image-modal">

    <span class="close-modal">&times;</span>

    <span class="prev-image">&#10094;</span>

    <img id="modalImage" class="modal-image" src="" alt="Gallery Image">

    <span class="next-image">&#10095;</span>

</div>

<script src="script.js"></script>

</body>

</html>
